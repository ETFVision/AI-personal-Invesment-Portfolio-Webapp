name: Weekly Intelligence Refresh

on:
  # Production scheduling moved to Supabase Cron. Keep this as a manual fallback.
  workflow_dispatch:

concurrency:
  group: weekly-intelligence-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check out workflow helper
        uses: actions/checkout@v6

      - name: Weekly news reconciliation
        run: bash scripts/call-job-endpoint.sh /api/jobs/weekly-news-reconciliation

      - name: Market Vision run
        run: bash scripts/call-job-endpoint.sh /api/jobs/weekly-market-vision

      - name: Recommendation run
        run: bash scripts/call-job-endpoint.sh /api/jobs/recommendation-run

      - name: Portfolio Review run
        run: bash scripts/call-job-endpoint.sh /api/jobs/portfolio-review-run

      - name: Telemetry evaluation
        run: bash scripts/call-job-endpoint.sh /api/jobs/telemetry-evaluation
