name: CI

on:
  pull_request:
    branches: [development, main]
  push:
    branches: [development, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, Test, Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'ci-placeholder' }}
      FMP_API_KEY: ci-placeholder
      FRED_API_KEY: ci-placeholder
      NEWSDATA_API_KEY: ci-placeholder
      OPENAI_API_KEY: ci-placeholder
      CRON_SECRET: ci-placeholder
      SCHEDULED_USER_ID: ci-placeholder
      SCHEDULED_PORTFOLIO_ID: ci-placeholder
      PRODUCT_MODE: full

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
