name: Monthly Slow Refresh

on:
  # Production scheduling moved to Supabase Cron. Keep this as a manual fallback.
  workflow_dispatch:

concurrency:
  group: monthly-slow-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      APP_URL: ${{ secrets.APP_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Check out workflow helper
        uses: actions/checkout@v6

      - name: ETF look-through refresh batch 1
        run: bash scripts/call-job-endpoint.sh /api/jobs/etf-lookthrough-refresh

      - name: ETF look-through refresh batch 2
        run: bash scripts/call-job-endpoint.sh /api/jobs/etf-lookthrough-refresh

      - name: ETF look-through refresh batch 3
        run: bash scripts/call-job-endpoint.sh /api/jobs/etf-lookthrough-refresh

      - name: ETF look-through refresh batch 4
        run: bash scripts/call-job-endpoint.sh /api/jobs/etf-lookthrough-refresh

      - name: ETF look-through refresh batch 5
        run: bash scripts/call-job-endpoint.sh /api/jobs/etf-lookthrough-refresh

      - name: Universe validation
        run: bash scripts/call-job-endpoint.sh /api/jobs/universe-validation
